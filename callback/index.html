<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SOHAUS — Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1A1009;
            color: #F0D4A8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card { text-align: center; padding: 2rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #8B6240; font-size: 0.9rem; }
        a { color: #D8A158; text-decoration: underline; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SOHAUS</h1>
        <p>Redirecting back to the app...</p>
        <p><a id="link" href="#">Tap here if not redirected</a></p>
    </div>
    <script>
        // Build the custom-scheme URL from query params
        var appURL = 'sohaus://callback' + window.location.search;
        
        // Set the fallback link immediately
        document.getElementById('link').href = appURL;
        
        // Try multiple redirect strategies for ASWebAuthenticationSession
        // Strategy 1: window.location.replace (most compatible)
        try { window.location.replace(appURL); } catch(e) {}
        
        // Strategy 2: top.location (in case of iframe)
        setTimeout(function() {
            try { top.location.href = appURL; } catch(e) {}
        }, 100);
        
        // Strategy 3: Create and click a hidden anchor
        setTimeout(function() {
            var a = document.createElement('a');
            a.href = appURL;
            document.body.appendChild(a);
            a.click();
        }, 300);
    </script>
</body>
</html>
