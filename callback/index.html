<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SOHAUS — Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1A1009;
            color: #F0D4A8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #8B6240; font-size: 0.9rem; }
        a { color: #D8A158; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SOHAUS</h1>
        <p>Redirecting back to the app...</p>
        <p id="fallback" style="display:none">
            If you're not redirected automatically,
            <a id="link" href="#">tap here</a>.
        </p>
    </div>
    <script>
        // Grab the full query string from the current URL
        // e.g. ?code=XXXX&state=YYYY
        const params = window.location.search;

        // Build the custom-scheme URL that the app will catch
        const appURL = 'sohaus://callback' + params;

        // Try to redirect immediately
        window.location.href = appURL;

        // Show fallback link after 1 second in case redirect doesn't fire
        setTimeout(() => {
            document.getElementById('fallback').style.display = 'block';
            document.getElementById('link').href = appURL;
        }, 1000);
    </script>
</body>
</html>
